<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRISON ESCAPE</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0d0d;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    user-select: none;
    -webkit-user-select: none;
  }

  /* Concrete wall texture */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.008) 2px, rgba(255,255,255,0.008) 4px),
      repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(255,255,255,0.005) 3px, rgba(255,255,255,0.005) 6px),
      radial-gradient(ellipse at 50% 30%, #1a1a1a 0%, #080808 100%);
    z-index: 0;
  }

  /* Prison bars overlay */
  .bars {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 1;
    background: repeating-linear-gradient(
      90deg,
      transparent,
      transparent 48px,
      rgba(0,0,0,0.25) 48px,
      rgba(0,0,0,0.25) 54px
    );
  }

  /* Searchlight sweep */
  .searchlight {
    position: fixed;
    top: -200px; left: 50%;
    width: 600px; height: 1200px;
    background: radial-gradient(ellipse at 50% 0%, rgba(255,200,50,0.04) 0%, transparent 70%);
    transform-origin: top center;
    animation: sweep 8s ease-in-out infinite;
    pointer-events: none; z-index: 2;
  }
  @keyframes sweep {
    0%, 100% { transform: translateX(-50%) rotate(-25deg); }
    25% { transform: translateX(-50%) rotate(-15deg); }
    50% { transform: translateX(-50%) rotate(15deg); }
    75% { transform: translateX(-50%) rotate(25deg); }
  }

  /* Main menu container */
  .menu {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; gap: 40px;
    text-align: center;
  }

  /* Title */
  .title-block {
    border: 3px solid #333;
    padding: 30px 60px;
    background: rgba(10,10,10,0.9);
    position: relative;
  }
  .title-block::before {
    content: '';
    position: absolute; top: -3px; left: -3px;
    right: -3px; bottom: -3px;
    border: 1px solid rgba(255,120,20,0.15);
    pointer-events: none;
  }
  .title-block h1 {
    font-size: 3.5rem;
    color: #ccc;
    letter-spacing: 12px;
    font-weight: 700;
    text-shadow: 0 0 60px rgba(255,120,20,0.2);
    line-height: 1;
  }
  .title-block .subtitle {
    font-size: 0.7rem;
    color: #555;
    letter-spacing: 6px;
    margin-top: 10px;
  }

  /* Prison number plate */
  .inmate-plate {
    display: flex; align-items: center; gap: 0;
    background: #111;
    border: 2px solid #2a2a2a;
    padding: 0;
    overflow: hidden;
  }
  .inmate-plate .mug {
    width: 60px; height: 70px;
    background: #1a1a1a;
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem;
    color: #333;
  }
  .inmate-plate .info {
    padding: 10px 20px;
    text-align: left;
    border-left: 2px solid #2a2a2a;
  }
  .inmate-plate .info .label {
    font-size: 0.55rem; color: #444; letter-spacing: 3px;
  }
  .inmate-plate .info .id {
    font-size: 1.4rem; color: #ff6600; letter-spacing: 4px; font-weight: bold;
  }

  /* Buttons */
  .menu-buttons {
    display: flex; flex-direction: column;
    gap: 12px; align-items: center;
  }

  .btn {
    display: block;
    width: 320px;
    padding: 16px 0;
    font-family: 'Courier New', monospace;
    font-size: 1rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: center;
    position: relative;
  }

  .btn-primary {
    background: #1a0a00;
    color: #ff6600;
    border: 2px solid #ff6600;
  }
  .btn-primary:hover {
    background: #2a1000;
    color: #ff8833;
    border-color: #ff8833;
    box-shadow: 0 0 40px rgba(255,102,0,0.2), inset 0 0 20px rgba(255,102,0,0.05);
    letter-spacing: 6px;
  }

  .btn-secondary {
    background: transparent;
    color: #555;
    border: 1px solid #2a2a2a;
  }
  .btn-secondary:hover {
    color: #888;
    border-color: #444;
    background: rgba(255,255,255,0.02);
  }

  .btn-secondary.locked {
    color: #2a2a2a;
    border-color: #1a1a1a;
    cursor: not-allowed;
  }
  .btn-secondary.locked:hover {
    color: #2a2a2a;
    border-color: #1a1a1a;
    background: transparent;
  }

  /* Stats strip */
  .stats-strip {
    display: flex; gap: 30px;
    font-size: 0.65rem;
    color: #444;
    letter-spacing: 2px;
  }
  .stats-strip span { color: #666; }

  /* Flicker effect */
  .flicker {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.03);
    pointer-events: none; z-index: 99;
    animation: flicker 0.15s infinite;
    opacity: 0;
  }
  @keyframes flicker {
    0% { opacity: 0; }
    50% { opacity: 0.03; }
    100% { opacity: 0; }
  }

  /* Footer */
  .footer {
    position: fixed; bottom: 20px;
    color: #2a2a2a; font-size: 0.6rem;
    letter-spacing: 3px; z-index: 10;
  }

  /* Character cards */
  .char-card {
    width: 150px;
    background: #111;
    border: 2px solid #222;
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: center;
    padding: 0 0 12px 0;
    overflow: hidden;
  }
  .char-card:hover {
    border-color: #444;
    background: #181818;
  }
  .char-card.selected {
    border-color: #ff6600;
    box-shadow: 0 0 20px rgba(255,102,0,0.2);
  }
  .char-avatar {
    width: 100%; height: 120px;
    display: flex; align-items: center; justify-content: center;
    font-size: 3.5rem;
    border-bottom: 1px solid #1a1a1a;
  }
  .char-initial {
    font-size: 3rem;
    font-weight: bold;
    color: #555;
    font-family: 'Courier New', monospace;
  }
  .char-card.selected .char-initial { color: #ff6600; }
  .char-card:nth-child(1) .char-avatar { background: #1a1410; }
  .char-card:nth-child(2) .char-avatar { background: #1a1816; }
  .char-card:nth-child(3) .char-avatar { background: #1a1410; }
  .char-card:nth-child(4) .char-avatar { background: #1a1816; }
  .char-card:nth-child(5) .char-avatar { background: #1a1816; }
  .char-name {
    color: #ccc; font-size: 0.85rem;
    letter-spacing: 2px; margin-top: 10px;
    font-weight: bold;
  }
  .char-id {
    color: #555; font-size: 0.6rem;
    letter-spacing: 1px; margin-top: 4px;
  }
  .char-card.selected .char-name { color: #ff6600; }
  .char-card.selected .char-id { color: #884400; }
  .char-card.locked {
    opacity: 0.35;
    cursor: not-allowed;
    filter: grayscale(1);
  }
  .char-card.locked:hover {
    border-color: #222;
    background: #111;
  }
  .char-lock-hint {
    color: #441100;
    font-size: 0.55rem;
    letter-spacing: 2px;
    margin-top: 4px;
  }

  /* Difficulty buttons */
  .diff-btn {
    display: block; width: 400px;
    padding: 16px 24px;
    background: #0d0d10;
    color: #888;
    border: 1px solid #222;
    cursor: pointer; font-family: 'Courier New', monospace;
    font-size: 0.9rem; letter-spacing: 2px;
    text-align: left;
    transition: all 0.25s ease;
  }
  .diff-btn:hover { background: #14141a; border-color: #444; }
  .diff-btn.selected {
    border-color: #ff6600;
    box-shadow: 0 0 20px rgba(255,102,0,0.15);
  }
  .diff-btn.selected .diff-title { color: #ff6600; }
  .diff-title {
    display: block; font-size: 1rem;
    color: #aaa; letter-spacing: 4px; font-weight: bold;
  }
  .diff-desc {
    display: block; font-size: 0.7rem;
    color: #555; margin-top: 4px; letter-spacing: 0;
  }
</style>
</head>
<body>

<div class="bars"></div>
<div class="searchlight"></div>
<div class="flicker" id="flicker"></div>

<div class="menu" id="main-menu">
  <div class="title-block">
    <h1>PRISON<br>ESCAPE</h1>
    <div class="subtitle">BLACKRIDGE PENITENTIARY</div>
  </div>

  <div class="inmate-plate">
    <div class="mug"><span style="font-size:2rem;font-weight:bold;color:#555;font-family:'Courier New',monospace;">F</span></div>
    <div class="info">
      <div class="label">INMATE</div>
      <div class="id">#48291</div>
    </div>
  </div>

  <div class="menu-buttons">
    <button class="btn btn-primary" id="btn-start">START GAME</button>
    <button class="btn btn-secondary" id="btn-characters">CHARACTERS</button>
    <button class="btn btn-secondary" id="btn-settings">SETTINGS</button>
    <button class="btn btn-secondary locked" id="btn-levels">UNBEATABLE</button>
  </div>

  <div class="stats-strip">
    ESCAPES: <span id="escapes-stat">0</span>
    &nbsp;&middot;&nbsp;
    CAUGHT: <span id="caught-stat">0</span>
    &nbsp;&middot;&nbsp;
    BEST LEVEL: <span id="best-stat">—</span>
  </div>
</div>

<!-- Character Select overlay -->
<div id="char-overlay" style="display:none; position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.95); flex-direction:column; justify-content:center; align-items:center; font-family:'Courier New',monospace;">
  <h2 style="color:#ff6600; letter-spacing:6px; font-size:1.3rem; margin-bottom:30px;">SELECT INMATE</h2>
  <div id="char-grid" style="display:flex; gap:16px; flex-wrap:wrap; justify-content:center; max-width:900px;"></div>
  <button class="btn btn-secondary" id="btn-char-back" style="margin-top:30px;">BACK</button>
</div>

<!-- Story intro overlay -->
<div id="story-overlay" style="display:none; position:fixed; inset:0; z-index:250; background:rgba(0,0,0,0.97); flex-direction:column; justify-content:center; align-items:center; font-family:'Courier New',monospace; text-align:center;">
  <div class="inmate-plate" style="margin-bottom:25px;">
    <div class="mug" id="story-mug">&#128100;</div>
    <div class="info">
      <div class="label">INMATE</div>
      <div class="id" id="story-id">#48291</div>
    </div>
  </div>
  <div id="story-name" style="color:#ff6600; font-size:1.2rem; letter-spacing:4px; margin-bottom:20px;"></div>
  <div id="story-text" style="color:#888; max-width:500px; line-height:1.8; font-size:0.9rem; margin-bottom:40px;"></div>
  <button class="btn btn-primary" id="btn-story-continue">CONTINUE</button>
</div>

<!-- Settings / Difficulty overlay -->
<div id="settings-overlay" style="display:none; position:fixed; inset:0; z-index:250; background:rgba(0,0,0,0.95); flex-direction:column; justify-content:center; align-items:center; font-family:'Courier New',monospace;">
  <h2 style="color:#ff6600; letter-spacing:6px; font-size:1.3rem; margin-bottom:40px;">DIFFICULTY</h2>
  <div style="display:flex; flex-direction:column; gap:14px; align-items:center;">
    <button class="diff-btn" data-diff="easy" id="diff-easy">
      <span class="diff-title">EASY</span>
      <span class="diff-desc">Guards are slower. Fewer cameras. More time to think.</span>
    </button>
    <button class="diff-btn selected" data-diff="normal" id="diff-normal">
      <span class="diff-title">NORMAL</span>
      <span class="diff-desc">Standard prison security. Fair challenge.</span>
    </button>
    <button class="diff-btn" data-diff="hard" id="diff-hard">
      <span class="diff-title">HARD</span>
      <span class="diff-desc">Maximum security. Guards everywhere. No room for error.</span>
    </button>
  </div>
  <button class="btn btn-secondary" id="btn-settings-back" style="margin-top:30px;">BACK</button>
</div>

<div class="footer">BLACKRIDGE PENITENTIARY &mdash; MAXIMUM SECURITY</div>

<!-- Game canvas (hidden until game starts) -->
<canvas id="game-canvas" width="800" height="600" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:150; image-rendering:pixelated;"></canvas>

<script>
// --- Menu logic ---
const btnStart = document.getElementById('btn-start');
const btnLevels = document.getElementById('btn-levels');
const btnCharacters = document.getElementById('btn-characters');
const btnSettings = document.getElementById('btn-settings');
const flicker = document.getElementById('flicker');

// Load stats from localStorage
let escapes = parseInt(localStorage.getItem('pe_escapes') || '0');
let caught = parseInt(localStorage.getItem('pe_caught') || '0');
let bestLevel = parseInt(localStorage.getItem('pe_best') || '0');

document.getElementById('escapes-stat').textContent = escapes;
document.getElementById('caught-stat').textContent = caught;
document.getElementById('best-stat').textContent = bestLevel > 0 ? bestLevel : '\u2014';

// Character data — Franklin always unlocked, others unlocked by reaching certain levels
const characters = [
  { name: 'Franklin', id: '#48291', skin: '#6b4c2a', icon: '\u{1F474}', trait: 'The Strategist', unlockLevel: 0,
    story: 'Franklin got caught doing illegal street races in Los Santos. When the cops cornered him, he rammed their cruiser and made a run for it. They caught him three blocks later. Now Blackridge is his finish line.' },
  { name: 'Arthur',   id: '#77304', skin: '#d4a574', icon: '\u{1F9D4}', trait: 'The Brawler', unlockLevel: 3,
    story: 'Arthur was trying to get to Tahiti — illegally. No passport, no visa, just a forged ticket and a dream. Federal agents picked him up at the dock. They say he fought six of them before the cuffs went on.' },
  { name: 'Carl',     id: '#55912', skin: '#5c3a1e', icon: '\u{1F9D1}', trait: 'The Hacker', unlockLevel: 5,
    story: 'Carl ran with a hood gang in Grove Street. A turf war went wrong and someone didn\'t make it out. Carl took the fall. He\'s been inside for three years, but he\'s been planning his way out for two.' },
  { name: 'Tommy',    id: '#66188', skin: '#e0b894', icon: '\u{1F468}', trait: 'The Ghost', unlockLevel: 7,
    story: 'Tommy was laundering money through a chain of car dealerships. The IRS couldn\'t catch him — but a disgruntled accountant could. He walked into Blackridge in a three-piece suit. He plans to walk out in anything.' },
  { name: 'John',     id: '#33007', skin: '#c99b7a', icon: '\u{1F935}', trait: 'The Lockpick', unlockLevel: 10,
    story: 'John Marston was an outlaw. Bank robberies, train heists, you name it. The Bureau finally got him after a shootout in Blackwater. They threw him in Blackridge and threw away the key. That was their mistake.' },
];
let selectedChar = parseInt(localStorage.getItem('pe_char') || '0');

// Track unlocked characters in localStorage (comma-separated indices)
let unlockedChars = (localStorage.getItem('pe_unlocked') || '0').split(',').map(Number);

// Unlock UNBEATABLE if 3+ characters already available from previous sessions
if (unlockedChars.length >= 3) {
  btnLevels.classList.remove('locked');
  btnLevels.textContent = 'UNBEATABLE';
}

function isCharUnlocked(i) {
  return unlockedChars.includes(i);
}

function unlockChar(i) {
  if (!unlockedChars.includes(i)) {
    unlockedChars.push(i);
    localStorage.setItem('pe_unlocked', unlockedChars.join(','));
  }
  // Unlock UNBEATABLE when 3 characters are available
  if (unlockedChars.length >= 3) {
    btnLevels.classList.remove('locked');
    btnLevels.textContent = 'UNBEATABLE';
  }
}

const charOverlay = document.getElementById('char-overlay');
const charGrid = document.getElementById('char-grid');
const btnCharBack = document.getElementById('btn-char-back');

function buildCharGrid() {
  charGrid.innerHTML = '';
  characters.forEach((ch, i) => {
    const unlocked = isCharUnlocked(i);
    const card = document.createElement('div');
    card.className = 'char-card' + (i === selectedChar && unlocked ? ' selected' : '') + (!unlocked ? ' locked' : '');
    const lockHint = !unlocked ? `<div class="char-lock-hint">ESCAPE LEVEL ${ch.unlockLevel}</div>` : '';
    card.innerHTML = `
      <div class="char-avatar">${unlocked ? '<span class="char-initial">' + ch.name[0] + '</span>' : '&#128274;'}</div>
      <div class="char-name">${unlocked ? ch.name.toUpperCase() : '???'}</div>
      <div class="char-id">${unlocked ? ch.id : 'LOCKED'}</div>
      ${lockHint}
    `;
    if (unlocked) {
      card.addEventListener('click', () => {
        selectedChar = i;
        localStorage.setItem('pe_char', i);
        buildCharGrid();
      });
    }
    charGrid.appendChild(card);
  });
}

btnCharacters.addEventListener('click', () => {
  buildCharGrid();
  charOverlay.style.display = 'flex';
});

btnCharBack.addEventListener('click', () => {
  charOverlay.style.display = 'none';
});

btnStart.addEventListener('click', () => {
  const ch = characters[selectedChar];
  document.getElementById('story-mug').innerHTML = '<span style="font-size:2rem;font-weight:bold;color:#555;font-family:Courier New,monospace;">' + ch.name[0] + '</span>';
  document.getElementById('story-id').textContent = ch.id;
  document.getElementById('story-name').textContent = ch.name.toUpperCase();
  document.getElementById('story-text').textContent = ch.story;
  document.getElementById('story-overlay').style.display = 'flex';
});

document.getElementById('btn-story-continue').addEventListener('click', () => {
  document.getElementById('story-overlay').style.display = 'none';
  startGame();
});

// Settings — difficulty selection
let difficulty = localStorage.getItem('pe_diff') || 'normal';
const settingsOverlay = document.getElementById('settings-overlay');
const diffBtns = document.querySelectorAll('.diff-btn');

function updateDiffSelection() {
  diffBtns.forEach(b => b.classList.toggle('selected', b.dataset.diff === difficulty));
}

diffBtns.forEach(b => {
  b.addEventListener('click', () => {
    difficulty = b.dataset.diff;
    localStorage.setItem('pe_diff', difficulty);
    updateDiffSelection();
  });
});

btnSettings.addEventListener('click', () => {
  updateDiffSelection();
  settingsOverlay.style.display = 'flex';
});

document.getElementById('btn-settings-back').addEventListener('click', () => {
  settingsOverlay.style.display = 'none';
});

// Occasional light flicker
setInterval(() => {
  if (Math.random() > 0.85) {
    flicker.style.animation = 'none';
    flicker.offsetHeight;
    flicker.style.animation = 'flicker 0.15s ' + (Math.random() > 0.5 ? 'infinite' : '3');
  }
}, 4000);

// =====================================================================
//   GAME ENGINE — Top-Down Auto-Runner (Dino-game style)
// =====================================================================
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;

// Game state
let gameRunning, player, obstacles, keys, score, scrollY, hasKey, caughtTimer;
let gameSpeed, obstacleTimer, levelComplete;

const DIFF_MULTS = {
  easy:   { speed: 100, guardFreq: 2.0, graceTime: 1.4 },
  normal: { speed: 150, guardFreq: 1.3, graceTime: 0.9 },
  hard:   { speed: 200, guardFreq: 0.8, graceTime: 0.5 },
};

function startGame() {
  document.getElementById('main-menu').style.display = 'none';
  document.querySelector('.footer').style.display = 'none';
  canvas.style.display = 'block';

  const mult = DIFF_MULTS[difficulty];
  gameRunning = true;
  gameSpeed = mult.speed;
  player = { x: W/2, y: H - 100, w: 20, h: 20, speed: 200 };
  obstacles = [];
  keys = [];
  score = 0;
  scrollY = 0;
  hasKey = false;
  caughtTimer = 0;
  obstacleTimer = 0;
  levelComplete = false;

  requestAnimationFrame(gameLoop);
}

let lastFrame = 0;
let keysDown = {};

document.addEventListener('keydown', e => { keysDown[e.key.toLowerCase()] = true; });
document.addEventListener('keyup', e => { keysDown[e.key.toLowerCase()] = false; });

function gameLoop(ts) {
  if (!gameRunning) return;
  const dt = Math.min((ts - lastFrame) / 1000, 0.05);
  lastFrame = ts;

  const mult = DIFF_MULTS[difficulty];

  // Player movement (left/right only, auto-runs forward)
  let dx = 0;
  if (keysDown['a'] || keysDown['arrowleft']) dx = -1;
  if (keysDown['d'] || keysDown['arrowright']) dx = 1;
  player.x += dx * player.speed * dt;
  player.x = Math.max(60, Math.min(W - 60, player.x));

  // Scroll
  scrollY += gameSpeed * dt;
  score = Math.floor(scrollY / 10);

  // Spawn obstacles (guards)
  obstacleTimer -= dt;
  if (obstacleTimer <= 0) {
    obstacleTimer = mult.guardFreq + Math.random() * 0.8;
    const gx = 60 + Math.random() * (W - 120);
    obstacles.push({ x: gx, y: -40, w: 24, h: 24, active: true });
  }

  // Spawn keys occasionally
  if (Math.random() < 0.003 && keys.length === 0) {
    keys.push({ x: 60 + Math.random() * (W - 120), y: -40, collected: false });
  }

  // Move obstacles down (they scroll toward player)
  for (const o of obstacles) {
    o.y += gameSpeed * dt;
    if (o.y > H + 50) o.active = false;
  }
  obstacles = obstacles.filter(o => o.active);

  // Move keys
  for (const k of keys) {
    if (k.collected) continue;
    k.y += gameSpeed * dt;
    if (k.y > H + 50) k.collected = true; // miss
  }

  // Collision: player vs guards
  for (const o of obstacles) {
    const px = player.x, py = player.y;
    const pw = player.w, ph = player.h;
    if (px - pw/2 < o.x + o.w/2 && px + pw/2 > o.x - o.w/2 &&
        py - ph/2 < o.y + o.h/2 && py + ph/2 > o.y - o.h/2) {
      caughtTimer += dt;
      if (caughtTimer > mult.graceTime) {
        gameRunning = false;
        caught++;
        localStorage.setItem('pe_caught', caught);
        document.getElementById('caught-stat').textContent = caught;
        endGame('caught');
        return;
      }
    } else {
      // Check distance for nearby guards
      const d = Math.hypot(px - o.x, py - o.y);
      if (d > 60) caughtTimer = Math.max(0, caughtTimer - dt * 2);
    }
  }

  // Key pickup
  for (const k of keys) {
    if (k.collected) continue;
    const d = Math.hypot(player.x - k.x, player.y - k.y);
    if (d < 30) {
      k.collected = true;
      hasKey = true;
    }
  }

  // Level complete: escape after enough distance with key
  if (scrollY > 3000 && hasKey && !levelComplete) {
    levelComplete = true;
    gameRunning = false;
    escapes++;
    localStorage.setItem('pe_escapes', escapes);
    document.getElementById('escapes-stat').textContent = escapes;
    const newBest = Math.max(bestLevel, 1);
    if (newBest > bestLevel) {
      bestLevel = newBest;
      localStorage.setItem('pe_best', bestLevel);
      document.getElementById('best-stat').textContent = bestLevel;
      if (bestLevel >= 3) unlockChar(1);
      if (bestLevel >= 5) unlockChar(2);
      if (bestLevel >= 7) unlockChar(3);
      if (bestLevel >= 10) unlockChar(4);
    }
    endGame('escaped');
    return;
  }

  // ============ RENDER ============
  // Scrolling floor
  const floorOffset = scrollY % 40;
  ctx.fillStyle = '#1a1a1c';
  ctx.fillRect(0, 0, W, H);
  for (let y = -floorOffset; y < H; y += 40) {
    for (let x = 0; x < W; x += 40) {
      ctx.fillStyle = '#1e1e22';
      ctx.fillRect(x, y, 39, 39);
      ctx.fillStyle = '#1a1a1e';
      ctx.fillRect(x+1, y+1, 37, 37);
    }
  }

  // Side walls
  ctx.fillStyle = '#3a3a3a';
  ctx.fillRect(0, 0, 50, H);
  ctx.fillRect(W-50, 0, 50, H);
  for (let y = 0; y < H; y += 40) {
    ctx.fillStyle = '#444';
    ctx.fillRect(4, y, 42, 35);
    ctx.fillRect(W-46, y, 42, 35);
    ctx.fillStyle = '#333';
    ctx.fillRect(8, y+4, 34, 27);
    ctx.fillRect(W-42, y+4, 34, 27);
  }

  // Keys
  for (const k of keys) {
    if (k.collected) continue;
    ctx.fillStyle = '#ffaa00';
    ctx.beginPath();
    ctx.arc(k.x, k.y, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffdd44';
    ctx.beginPath();
    ctx.arc(k.x-2, k.y-2, 4, 0, Math.PI * 2);
    ctx.fill();
    // Key float animation
    ctx.fillStyle = '#fff';
    ctx.font = '10px monospace';
    ctx.fillText('KEY', k.x - 14, k.y - 14);
  }

  // Guards (obstacles)
  for (const o of obstacles) {
    // Vision cone
    const coneY = o.y + o.h/2;
    ctx.fillStyle = 'rgba(255,0,0,0.08)';
    ctx.beginPath();
    ctx.moveTo(o.x, coneY);
    ctx.arc(o.x, coneY, 80, -0.6, 0.6);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,50,50,0.3)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Body
    ctx.fillStyle = '#993333';
    ctx.beginPath();
    ctx.arc(o.x, o.y, 14, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#cc4444';
    ctx.beginPath();
    ctx.arc(o.x-3, o.y-3, 6, 0, Math.PI * 2);
    ctx.fill();
    // Hat
    ctx.fillStyle = '#111';
    ctx.fillRect(o.x-9, o.y-18, 18, 7);
    // Badge
    ctx.fillStyle = '#ffcc00';
    ctx.fillRect(o.x-3, o.y+8, 6, 4);
  }

  // Player (Franklin with the yee-yee ass haircut)
  const px = player.x, py = player.y;
  // Body
  ctx.fillStyle = '#3366aa';
  ctx.beginPath();
  ctx.arc(px, py + 2, 12, 0, Math.PI * 2);
  ctx.fill();
  // Head (dark skin)
  ctx.fillStyle = '#6b4c2a';
  ctx.beginPath();
  ctx.arc(px, py - 4, 10, 0, Math.PI * 2);
  ctx.fill();
  // Face details
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(px - 3, py - 6, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(px + 3, py - 6, 2, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(px - 3, py - 6, 1, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(px + 3, py - 6, 1, 0, Math.PI * 2); ctx.fill();
  // Yee-yee ass haircut: high top fade
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(px - 9, py - 16, 18, 8);
  ctx.fillRect(px - 7, py - 18, 14, 4);
  ctx.fillRect(px - 5, py - 20, 10, 3);
  // Fade sides
  ctx.fillStyle = '#2a2a2a';
  ctx.fillRect(px - 10, py - 13, 3, 5);
  ctx.fillRect(px + 7, py - 13, 3, 5);
  // Prison jumpsuit
  ctx.fillStyle = '#ff6600';
  ctx.fillRect(px - 10, py + 4, 20, 14);
  ctx.fillStyle = '#ff8833';
  ctx.fillRect(px - 8, py + 4, 4, 14);
  ctx.fillRect(px + 4, py + 4, 4, 14);

  // Caught warning
  if (caughtTimer > 0) {
    const pct = Math.min(caughtTimer / mult.graceTime, 1);
    ctx.fillStyle = `rgba(255,0,0,${0.15 + pct * 0.35})`;
    ctx.fillRect(0, 0, W, H);
    if (pct > 0.5) {
      ctx.fillStyle = '#ff0000';
      ctx.font = 'bold 18px monospace';
      ctx.fillText('! DETECTED !', W/2 - 70, H/2);
    }
  }

  // HUD
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, 36);
  ctx.fillStyle = '#888';
  ctx.font = '13px monospace';
  ctx.fillText('DISTANCE: ' + score + 'm', 12, 24);
  ctx.fillText(hasKey ? 'KEY: YES' : 'KEY: NO', 200, 24);
  ctx.fillText('LEVEL 1', W - 100, 24);

  // Progress bar
  const progress = Math.min(scrollY / 3000, 1);
  ctx.fillStyle = '#333';
  ctx.fillRect(W/2 - 150, H - 20, 300, 10);
  ctx.fillStyle = hasKey ? '#00aa00' : '#ff6600';
  ctx.fillRect(W/2 - 150, H - 20, 300 * progress, 10);
  ctx.fillStyle = '#666';
  ctx.font = '10px monospace';
  ctx.fillText(hasKey ? 'ESCAPE!' : 'FIND KEY', W/2 - 30, H - 8);

  requestAnimationFrame(gameLoop);
}

function endGame(reason) {
  canvas.style.display = 'none';
  document.getElementById('main-menu').style.display = 'flex';
  document.querySelector('.footer').style.display = 'block';
}
</script>
